volumes:
  oo-data:
    driver: local
  oo-logs:
    driver: local
  oo-fonts:
    driver: local
  oo-db:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onlyoffice
      POSTGRES_USER: onlyoffice
      POSTGRES_PASSWORD: onlyoffice
    volumes:
      - oo-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  documentserver:
    image: onlyoffice/documentserver:latest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Database
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: onlyoffice
      DB_USER: onlyoffice
      DB_PWD: onlyoffice

      # Message broker
      AMQP_URI: amqp://guest:guest@rabbitmq
      AMQP_TYPE: rabbitmq

      # JWT auth — change this secret before deploying
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-my-jwt-secret-change-me}
      JWT_HEADER: Authorization
      JWT_IN_BODY: "true"

      # Uncomment to use HTTPS via built-in Let's Encrypt
      # LETS_ENCRYPT_DOMAIN: docs.example.com
      # LETS_ENCRYPT_MAIL: admin@example.com
    ports:
      - "${ONLYOFFICE_PORT:-9980}:80"
      # - "9443:443"  # uncomment for HTTPS
    volumes:
      - oo-data:/var/www/onlyoffice/Data
      - oo-logs:/var/log/onlyoffice
      - oo-fonts:/usr/share/fonts/truetype/custom
      - ./ds-docservice-cors.conf:/etc/nginx/includes/ds-docservice.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost/healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped