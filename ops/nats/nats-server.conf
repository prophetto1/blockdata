# Checked-in broker template. Service scripts render this into
# .codex-tmp/nats-runtime/nats-server.rendered.conf with the host-local runtime root.

server_name: "nats-coordination"
port: 4222
http: 8222

jetstream {
  store_dir: "{{RUNTIME_ROOT}}/jetstream"
  max_mem_store: 256MB
  max_file_store: 4GB
}

pid_file: "{{RUNTIME_ROOT}}/nats-server.pid"
log_file: "{{RUNTIME_ROOT}}/nats-server.log"
