services:
  mem0_store:
    image: qdrant/qdrant
    volumes:
      - ${WRITING_SYSTEM_ROOT_DOCKER}/_memory/openmemory/qdrant:/mem0/storage

  openmemory-mcp:
    image: mem0/openmemory-mcp
    build:
      context: ${OPENMEMORY_REPO_ROOT_DOCKER}/api
    env_file:
      - ${OPENMEMORY_REPO_ROOT_DOCKER}/api/.env
    environment:
      USER: ${OPENMEMORY_USER}
      DATABASE_URL: sqlite:////openmemory-data/api/openmemory.db
    depends_on:
      - mem0_store
    ports:
      - "8766:8765"
    volumes:
      - ${OPENMEMORY_REPO_ROOT_DOCKER}/api:/usr/src/openmemory
      - ${WRITING_SYSTEM_ROOT_DOCKER}/_memory/openmemory:/openmemory-data
    command: >
      sh -c "
        SDK=/usr/local/lib/python3.12/site-packages/mcp/server/streamable_http.py &&
        sed -i 's/has_json = any.*accept_types)/has_json = True  # patched: skip strict Accept check/' \"$$SDK\" &&
        sed -i 's/has_sse = any.*accept_types)/has_sse = True  # patched: skip strict Accept check/' \"$$SDK\" &&
        uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 4
      "

  openmemory-ui:
    image: mem0/openmemory-ui:latest
    build:
      context: ${OPENMEMORY_REPO_ROOT_DOCKER}/ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${OPENMEMORY_PUBLIC_API_URL}
      NEXT_PUBLIC_USER_ID: ${OPENMEMORY_USER}
