    new: kestra_plugin_items
    category: platform_registry
    status: completed
    notes:
      - "Mapping columns stripped (mapped_service_id, mapped_function_id, mapping_notes)."
      - "Read surface is view_integrations_map."
      - "Joins to registry tables via source_task_class / plugin_group."

  # Status enums
  - old: document_status_catalog
    new: status_document_uploads
    category: status_registry
    status: completed
  - old: conv_status_catalog
    new: status_conversions
