meta:
  name: table_rename_map
  version: 2
  date: 2026-03-03
  owner: jon
  completed_at: 2026-03-03T16:00:00Z
  execution_policy:
    mode: one_table_at_a_time
    require_compatibility_view: false  # done without compat views — clean rename
    require_import_updates_before_next_table: true
    require_verification_gate: true

