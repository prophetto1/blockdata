  # Platform / Registry
  - old: service_registry
    new: registry_services
    category: platform_registry
    status: completed
  - old: service_functions
    new: registry_service_functions
    category: platform_registry
    status: completed
  - old: service_type_catalog
    new: registry_service_types
    category: platform_registry
    status: completed
  - old: agent_catalog
    new: registry_agents
    category: platform_registry
