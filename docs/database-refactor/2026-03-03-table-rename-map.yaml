  - old: overlay_status_catalog
    new: status_overlays
    category: status_registry
    status: completed

  # User-scoped runtime/config
  - old: service_runs
    new: user_service_runs
    category: user_runtime
    status: completed
  - old: project_service_config
    new: user_project_service_config
    category: user_runtime
    status: completed

view_renames:
  - old: documents_view
    new: view_documents
    status: completed
  - old: service_functions_view
    new: view_service_functions
    status: completed
    notes:
      - "Recreated with new table names (registry_services, registry_service_functions, registry_service_types)."
  - old: kestra_wiring_view
    new: view_integrations_map
    status: completed
    notes:
      - "Recreated joining kestra_plugin_items + registry tables + satellites."
      - "Read-only. Join uses source_task_class instead of mapped_function_id."

