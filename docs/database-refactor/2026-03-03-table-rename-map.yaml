    status: completed
  - old: parsing_tool_catalog
    new: registry_parsing_tools
    category: platform_registry
    status: completed
  - old: representation_type_catalog
    new: registry_representation_types
    category: platform_registry
    status: completed
  - old: source_type_catalog
    new: registry_source_types
    category: platform_registry
    status: completed
  - old: docling_label_catalog
    new: registry_docling_labels
    category: platform_registry
    status: completed
  - old: docling_group_label_catalog
