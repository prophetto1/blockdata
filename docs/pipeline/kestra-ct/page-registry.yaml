ct_status_model:
  packet_pending: page is listed but no shared packet exists yet
  packet_seeded: shared packet exists and page execution can start with capture
  packet_in_revision: shared packet is being corrected or expanded
  packet_ready: shared packet is stable and ready for both sides
  packet_blocked: shared prerequisite or contract issue blocks packet progress
  packet_complete: shared packet has been executed and closed for current scope

side_status_model:
  not_started: side has not begun the page
  capturing: side is tracing the page
  planning: side is writing the implementation plan
  implementing: side is making runtime changes
  verifying: side is running verification
  blocked: side is stopped on a documented blocker
  partial: side completed part of the slice only
  done: side completed the slice with evidence

registry_update_rule:
  ct_status: shared packet lifecycle only
  ubuntu_status: owned by Ubuntu execution
  windows_status: owned by Windows execution
  note: page workers should normally update only their side field and should not write environment execution results into ct_status

