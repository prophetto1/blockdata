<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scalar API Client Host</title>
    <style>
      html,
      body,
      #scalar-client {
        height: 100%;
        width: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: transparent;
      }

      #scalar-client {
        background: var(--scalar-background-1, transparent);
      }

      #scalar-client-app {
        height: 100%;
      }

      /* Remove decorative ASCII art in empty states (bunny + response keycap/computer).
         Keep functional controls and import flow intact. */
      #scalar-client .rabbit-ascii,
      #scalar-client .rabbitjump,
      #scalar-client .rabbitsit,
      #scalar-client .keycap-hotkey,
      #scalar-client .keycap-n,
      #scalar-client .flex-center > div > .ascii-art {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="scalar-client" class="scalar-app scalar-client"></div>
    <script type="module" src="/src/scalar-host/main.ts"></script>
  </body>
</html>
