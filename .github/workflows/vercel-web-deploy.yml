name: Deploy Web To Vercel

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/vercel-web-deploy.yml'
      - 'web/.vercel/**'
      - '.vercel/project.json'
  workflow_dispatch:

concurrency:
  group: vercel-web-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install repo dependencies
        run: npm ci

      - name: Verify frontend build contract
        run: npm run ci:frontend

      - name: Load Vercel web project linkage
        run: |
          node -e "const fs=require('node:fs'); const project=JSON.parse(fs.readFileSync('web/.vercel/project.json','utf8')); fs.appendFileSync(process.env.GITHUB_ENV, `VERCEL_ORG_ID=${project.orgId}\nVERCEL_PROJECT_ID=${project.projectId}\n`);"

      - name: Pull Vercel production settings
        working-directory: web
        run: npx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build Vercel production artifact
        working-directory: web
        run: npx vercel@latest build --prod --token=$VERCEL_TOKEN

      - name: Deploy web to Vercel production
        id: deploy
        working-directory: web
        run: |
          deployment_url="$(npx vercel@latest deploy --prebuilt --prod --token=$VERCEL_TOKEN)"
          echo "deployment_url=${deployment_url}" >> "$GITHUB_OUTPUT"

      - name: Smoke-check production deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
          PRODUCTION_URL: https://blockdata.run
        run: |
          node --input-type=module - <<'EOF'
          const targets = [
            ['deployment', process.env.DEPLOYMENT_URL?.trim()],
            ['production', process.env.PRODUCTION_URL?.trim()],
          ];

          for (const [label, url] of targets) {
            if (!url) {
              throw new Error(`Missing ${label} url for smoke verification`);
            }

            const response = await fetch(url, { redirect: 'follow' });
            const html = await response.text();

            if (!response.ok) {
              throw new Error(`${label} smoke check failed with ${response.status} for ${url}`);
            }

            if (!html.includes('<title>BlockData</title>')) {
              throw new Error(`${label} smoke check did not find the BlockData HTML title for ${url}`);
            }
          }
          EOF
