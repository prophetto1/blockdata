<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – LegalChain</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['"EB Garamond"', 'serif'],
            classic: ['"Libre Baskerville"', 'serif'],
            mono: ['ui-monospace', 'monospace'],
          },
          colors: {
            void: '#050505',
            paper: '#f4f4f5',
            signal: '#dc2626',
          }
        }
      }
    }
  </script>

  <style>
    /* Absolute overrides to fix the 'font is wrong' issue */
    body {
      background-color: #ffffff !important;
      font-family: "EB Garamond", serif;
      -webkit-font-smoothing: antialiased;
    }
    .dark body {
      background-color: #050505 !important;
    }
    
    .content-serif {
      font-family: "EB Garamond", serif !important;
      border-bottom: none !important; /* Remove lingering line */
      padding-bottom: 0 !important;
      text-transform: none !important;
    }
    
    .label-mono {
      font-family: ui-monospace, monospace !important;
      text-transform: uppercase !important;
      letter-spacing: 0.1em;
    }

    ::selection { background: #dc2626; color: white; }
  </style>
</head>
<body class="bg-white dark:bg-void text-void dark:text-gray-200 min-h-screen transition-colors duration-500 selection:bg-signal selection:text-white">

  <!-- TOP BAR (Managed by site-shell.js) -->
  <div id="nav-container"></div>

  <!-- SINGLE COLUMN CONTENT CONTAINER -->
  <main id="l10-page" data-l10-layout="about" class="min-h-screen py-24 px-6 md:px-12 w-full mx-auto">

    <!-- HEADER SECTION -->
    <header class="mb-12 max-w-6xl">
      <h1 class="content-serif italic text-3xl md:text-4xl lg:text-4xl leading-tight text-void dark:text-white mb-12">
        We'd love to <span class="font-semibold">hear from you.</span>
      </h1>
    </header>

    <div class="space-y-12">
      
      <!-- Inquiries Block -->
      <article class="grid md:grid-cols-12 gap-8 items-start">

        
        <div class="md:col-span-8 space-y-8 max-w-3xl">
          <p class="content-serif text-lg leading-relaxed text-gray-700 dark:text-gray-300">
            Interested in partnerships, funding opportunities, or technical questions? We'd love to hear from you.
          </p>
          <p class="content-serif text-lg leading-relaxed text-gray-700 dark:text-gray-300">
            Prefer email? Reach us directly at <a href="mailto:ag@legalchain.run" class="text-teal-500 hover:underline">ag@legalchain.run</a>.
          </p>
        </div>
      </article>

      <!-- Contact Form Block -->
      <article class="grid md:grid-cols-12 gap-8 items-start">

        
        <div class="md:col-span-8 max-w-4xl">
            
            <!-- CONTACT FORM (Formspree + Boxed Design) -->
            <form id="contact-form" action="https://formspree.io/f/mqeargng" method="POST" class="space-y-6">
              
              <!-- Name -->
              <div>
                <label for="name" class="block text-sm font-medium mb-2 font-mono uppercase tracking-wider text-xs">Name</label>
                <input type="text" id="name" name="name" required 
                  class="w-full px-4 py-3 rounded border border-gray-300 dark:border-gray-700 bg-white dark:bg-black focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all" placeholder="Your name">
              </div>

              <!-- Email -->
              <div>
                <label for="email" class="block text-sm font-medium mb-2 font-mono uppercase tracking-wider text-xs">Email</label>
                <input type="email" id="email" name="email" required 
                  class="w-full px-4 py-3 rounded border border-gray-300 dark:border-gray-700 bg-white dark:bg-black focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all" placeholder="you@example.com">
              </div>

              <!-- Subject -->
              <div>
                <label for="subject" class="block text-sm font-medium mb-2 font-mono uppercase tracking-wider text-xs">Subject</label>
                <div class="relative">
                  <select id="subject" name="subject" required
                    class="w-full px-4 py-3 rounded border border-gray-300 dark:border-gray-700 bg-white dark:bg-black focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Select a topic...</option>
                    <option value="Funding / Investment">Funding / Investment</option>
                    <option value="Research Partnership">Research Partnership</option>
                    <option value="Enterprise Inquiry">Enterprise Inquiry</option>
                    <option value="Technical Question">Technical Question</option>
                    <option value="Media / Press">Media / Press</option>
                    <option value="Other">Other</option>
                  </select>
                  <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                  </div>
                </div>
              </div>

              <!-- Message -->
              <div>
                <label for="message" class="block text-sm font-medium mb-2 font-mono uppercase tracking-wider text-xs">Message</label>
                <textarea id="message" name="message" rows="5" required
                  class="w-full px-4 py-3 rounded border border-gray-300 dark:border-gray-700 bg-white dark:bg-black focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all resize-none" placeholder="Tell us what you're interested in..."></textarea>
              </div>

              <!-- Submit Button -->
              <div class="pt-2">
                <button type="submit" id="submit-btn" class="w-full px-8 py-4 bg-void dark:bg-white text-white dark:text-black hover:opacity-90 font-mono uppercase tracking-widest text-xs transition-opacity flex justify-center items-center gap-2">
                  <span>Send Message</span>
                </button>
              </div>
              
              <!-- Status Messages -->
              <div id="form-status" class="hidden">
                <div id="success-message" class="hidden text-center py-4 text-green-600 dark:text-green-400 font-mono text-xs uppercase tracking-widest">
                  Message sent successfully. We'll be in touch.
                </div>
                <div id="error-message" class="hidden text-center py-4 text-red-600 dark:text-red-400 font-mono text-xs uppercase tracking-widest">
                  Failed to send message. Please try again.
                </div>
              </div>
              
            </form>
            
            <div id="success-message" class="hidden text-center py-12">
               <!-- Success state is less relevant for mailto, but keeping structure just in case -->
            </div>

        </div>
      </article>

      <!-- Visual Footer -->
      <footer class="pt-12 border-t border-black/10 dark:border-white/10 mt-24">
        <div class="flex justify-center gap-6 font-mono text-xs uppercase tracking-widest">
          <a href="/about/index.html" class="px-8 py-4 bg-void dark:bg-white text-white dark:text-black hover:opacity-90">
            Who We Are
          </a>
          <a href="/about/mission.html" class="px-8 py-4 border border-gray-300 dark:border-gray-700 text-void dark:text-white hover:bg-gray-100 dark:hover:bg-gray-900 transition-colors">
            Mission
          </a>
        </div>
      </footer>

    </div>

  </main>
  
  <script src="../shared/site-shell.js"></script>
  <script>
    const form = document.getElementById("contact-form");
    const statusDiv = document.getElementById("form-status");
    const successMsg = document.getElementById("success-message");
    const errorMsg = document.getElementById("error-message");
    const submitBtn = document.getElementById("submit-btn");

    async function handleSubmit(event) {
      event.preventDefault();
      
      const data = new FormData(event.target);
      
      // Visual feedback
      const btnText = submitBtn.querySelector("span");
      const originalText = btnText.innerText;
      btnText.innerText = "SENDING...";
      submitBtn.disabled = true;

      try {
        const response = await fetch(event.target.action, {
          method: form.method,
          body: data,
          headers: {
            'Accept': 'application/json'
          }
        });
        
        statusDiv.classList.remove("hidden");
        
        if (response.ok) {
          successMsg.classList.remove("hidden");
          errorMsg.classList.add("hidden");
          form.reset();
          btnText.innerText = "SENT";
        } else {
          errorMsg.classList.remove("hidden");
          successMsg.classList.add("hidden");
           btnText.innerText = originalText;
           submitBtn.disabled = false;
        }
      } catch (error) {
        statusDiv.classList.remove("hidden");
        errorMsg.classList.remove("hidden");
        successMsg.classList.add("hidden");
        btnText.innerText = originalText;
        submitBtn.disabled = false;
      }
    }
    
    form.addEventListener("submit", handleSubmit);
  </script>

</body>
</html>
